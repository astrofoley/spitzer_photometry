name: pytest

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements.txt
      - name: Tests (not slow)
        run: pytest -m "not slow" --tb=short -q
