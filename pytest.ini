[pytest]
testpaths = tests
pythonpath = .
markers =
    slow: many-second tests (subprocess campaigns, large native-fit cases); default PR/CI uses -m "not slow"
filterwarnings =
    # SSC / pipeline PRF FITS sometimes carry a non-standard END card; astropy warns on write.
    ignore:Unexpected bytes trailing END keyword:astropy.utils.exceptions.AstropyUserWarning
    # Same as `src/solver.py`: redundant CD+CDELT in IRAC headers.
    ignore:.*[Cc]delt.*[Ii]gnored.*:RuntimeWarning
    ignore:.*[Cc]delt.*[Ii]gnored.*:UserWarning
